<!DOCTYPE html>
<html lang="eu">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Zeineuski — Basque dialect identification</title>
  <style>
    :root {
      --bg: #0f0f1a;
      --card: #1a1a30;
      --card-hover: #222240;
      --text: #e4e4ec;
      --text-muted: #8888a0;
      --accent: #e63946;
      --accent-hover: #c1121f;
      --green: #2a9d8f;
      --yellow: #e9c46a;
      --border: #2a2a45;
      --radius: 10px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      line-height: 1.5;
    }
    .container { max-width: 780px; width: 100%; padding: 2rem 1rem 1rem; }

    /* ── Header ── */
    header { text-align: center; margin-bottom: 2rem; }
    .logo {
      font-size: 2.2rem;
      font-weight: 800;
      letter-spacing: -1px;
    }
    .logo span { color: var(--accent); }
    .subtitle {
      color: var(--text-muted);
      font-size: 0.9rem;
      margin-top: 0.25rem;
    }

    /* ── Status bar ── */
    .status-bar {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      padding: 0.75rem 1rem;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      margin-bottom: 1.5rem;
      font-size: 0.82rem;
      color: var(--text-muted);
    }
    .status-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
    .status-dot.loading { background: var(--yellow); animation: pulse 1.2s ease infinite; }
    .status-dot.ready { background: var(--green); }
    .status-dot.error { background: var(--accent); }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

    .size-hint {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 0.7rem 1rem;
      margin-bottom: 1.5rem;
      font-size: 0.78rem;
      color: var(--text-muted);
      display: none;
    }
    .size-hint .green { color: var(--green); font-weight: 600; }

    /* ── Example cards (click to predict) ── */
    .section-label {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--text-muted);
      margin-bottom: 0.75rem;
      margin-top: 1rem;
    }
    .example-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 0.6rem;
      margin-bottom: 2rem;
    }
    .example-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 0.85rem 1rem;
      cursor: pointer;
      transition: all 0.15s;
    }
    .example-card:hover {
      border-color: var(--accent);
      background: var(--card-hover);
      transform: translateY(-1px);
    }
    .example-card.active {
      border-color: var(--accent);
      background: var(--card-hover);
      box-shadow: 0 0 0 1px var(--accent);
    }
    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.35rem;
    }
    .card-badge {
      font-size: 0.68rem;
      font-weight: 600;
      color: #fff;
      padding: 0.15rem 0.55rem;
      border-radius: 4px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .card-text {
      font-size: 0.88rem;
      color: var(--text);
      line-height: 1.45;
    }

    /* ── Textarea (custom input) ── */
    textarea {
      width: 100%;
      min-height: 100px;
      padding: 0.85rem 1rem;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-size: 0.95rem;
      font-family: inherit;
      resize: vertical;
      transition: border-color 0.2s;
    }
    textarea:focus {
      outline: none;
      border-color: var(--accent);
    }
    textarea::placeholder { color: #555; }

    .buttons {
      display: flex;
      gap: 0.5rem;
      margin: 0.75rem 0 1.5rem;
    }
    .btn {
      padding: 0.55rem 1.2rem;
      border: none;
      border-radius: 6px;
      font-size: 0.9rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
    }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover:not(:disabled) { background: var(--accent-hover); }
    .btn-secondary {
      background: transparent;
      color: var(--text-muted);
      border: 1px solid var(--border);
    }
    .btn-secondary:hover:not(:disabled) {
      background: var(--card);
      color: var(--text);
    }

    /* ── Results ── */
    .result {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.25rem 0.75rem;
      display: none;
    }
    .result.visible { display: block; }

    .dialect-badge {
      display: inline-block;
      padding: 0.3rem 0.9rem;
      border-radius: 5px;
      font-weight: 700;
      font-size: 1.05rem;
      margin-bottom: 0.6rem;
      color: #fff;
    }
    .badge-batua { background: #2a9d8f; }
    .badge-western { background: #e76f51; }
    .badge-central { background: #457b9d; }
    .badge-nav-lab { background: #6d597a; }
    .badge-uncertain { background: #555; }

    .conf-row {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 0.3rem;
    }
    .conf-label { font-size: 0.8rem; color: var(--text-muted); }
    .conf-value { font-size: 0.8rem; font-weight: 600; }

    .confidence-bar {
      height: 5px;
      background: #222;
      border-radius: 3px;
      margin: 0.5rem 0 1rem;
      overflow: hidden;
    }
    .confidence-fill {
      height: 100%;
      border-radius: 3px;
      background: var(--green);
      transition: width 0.35s ease;
    }

    .pred-list {
      list-style: none;
      border-top: 1px solid var(--border);
      padding-top: 0.5rem;
      margin-top: 0.5rem;
    }
    .pred-list li {
      display: flex;
      justify-content: space-between;
      padding: 0.3rem 0;
      font-size: 0.88rem;
    }
    .pred-label { font-weight: 500; }
    .pred-conf { color: var(--text-muted); font-variant-numeric: tabular-nums; }

    /* ── Footer ── */
    footer {
      text-align: center;
      padding: 2rem 1rem;
      color: var(--text-muted);
      font-size: 0.72rem;
    }
    footer a {
      color: var(--text-muted);
      text-decoration: underline;
      text-underline-offset: 2px;
    }
    footer a:hover { color: var(--accent); }

    /* ── Responsive ── */
    @media (max-width: 500px) {
      .container { padding: 1rem 0.75rem; }
      .logo { font-size: 1.7rem; }
      .example-grid { grid-template-columns: 1fr; }
    }
  </style>
  <script type="module" crossorigin src="/zeineuski-wasm/assets/index-CeCM58U1.js"></script>
</head>
<body>
  <div class="container">
    <header>
      <div class="logo"><span>Z</span>eineuski</div>
      <div class="subtitle">Basque dialect identification — Euskalkien identifikazio automatikoa</div>
    </header>

    <div class="status-bar">
      <div class="status-dot loading" id="statusDot"></div>
      <span id="statusText">Loading model… Modela kargatzen…</span>
    </div>
    <div class="size-hint" id="sizeHint">
      <span class="green">&#10003;</span> Model loaded — <strong id="variantSize"></strong>MB total (34MB)
    </div>

    <!-- Example sentences: click to select & auto-predict -->
    <div class="section-label">Click an example to identify:</div>
    <div class="example-grid" id="exampleCards"></div>

    <!-- Custom input -->
    <div class="section-label">Or write your own text:</div>
    <textarea
      id="input"
      placeholder="Idatzi euskarazko testua hemen… / Write Basque text here…"
    ></textarea>

    <div class="buttons">
      <button class="btn btn-primary" id="btnPredict" disabled>Identify</button>
      <button class="btn btn-secondary" id="btnClear">Clear</button>
    </div>

    <div class="result" id="result">
      <div id="dialectBadge"></div>
      <div class="conf-row">
        <span class="conf-label">Confidence:</span>
        <span class="conf-value" id="confidence">—</span>
      </div>
      <div class="confidence-bar">
        <div class="confidence-fill" id="confidenceFill" style="width:0%"></div>
      </div>
      <ul class="pred-list" id="predictionsList"></ul>
    </div>
  </div>

  <footer>
    <a href="https://huggingface.co/itzune/zeineuski" target="_blank" rel="noopener">Models</a>
    &middot;
    <a href="https://github.com/xezpeleta/zeineuski" target="_blank" rel="noopener">GitHub</a>
    &middot;
    fastText WASM &middot; 34MB
  </footer>

</body>
</html>
