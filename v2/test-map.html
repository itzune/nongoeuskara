<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>Map test</title></head>
<body>
<div id="mapContainer" style="width:900px;height:700px;border:2px solid red;"></div>
<script type="module">
import * as d3 from "/nongoeuskara/node_modules/.vite/deps/d3.js?v=1b92083c";
import * as topojson from "/nongoeuskara/node_modules/.vite/deps/topojson-client.js?v=1b92083c";

const resp = await fetch("/nongoeuskara/euskal-herria.json");
const topo = await resp.json();
console.log("Topo loaded:", topo.type, Object.keys(topo.objects));

const objName = Object.keys(topo.objects)[0];
const features = topojson.feature(topo, topo.objects[objName]).features;
console.log("Features:", features.length);

const geojson = { type: "FeatureCollection", features };

const proj = d3.geoEquirectangular().fitSize([900, 700], geojson);
const path = d3.geoPath(proj);

const svg = d3.select("#mapContainer")
  .append("svg")
  .attr("width", 900)
  .attr("height", 700);

svg.selectAll("path")
  .data(features)
  .join("path")
  .attr("d", path)
  .attr("fill", "#dde2e7")
  .attr("stroke", "#4a90d9")
  .attr("stroke-width", 0.3);

console.log("Rendered", features.length, "paths");
</script>
</body>
</html>
